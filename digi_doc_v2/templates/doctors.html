<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Doctors — Digi Doctor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
:root{--primary:#0f4c75;--accent:#1b6ca8;--light:#e8f4fd}
body{font-family:'DM Sans',sans-serif;background:#f8f9fa}
.nav-main{background:#fff;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:100;padding:.9rem 0}
.nav-brand{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:.5rem}
.nav-links a{color:#555;text-decoration:none;font-size:.92rem;font-weight:500;padding:.4rem .9rem;border-radius:8px;transition:.2s}
.nav-links a:hover{background:#f5f5f5;color:var(--primary)}
.page-hero{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:4rem 0 3rem}
.page-hero h1{font-family:'DM Serif Display',serif;font-size:2.5rem}
.search-bar{background:#fff;border-radius:50px;padding:.6rem 1.2rem;display:flex;align-items:center;gap:.8rem;max-width:480px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.search-bar input{border:none;outline:none;font-size:.95rem;width:100%}
.filter-chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.5rem}
.chip{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);border-radius:20px;padding:.3rem .9rem;font-size:.82rem;font-weight:500;cursor:pointer;transition:.2s}
.chip:hover,.chip.active{background:#fff;color:var(--primary);border-color:#fff}
.doc-grid{padding:3rem 0}
.doctor-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.06);transition:.25s;height:100%}
.doctor-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(0,0,0,.1)}
.doctor-img-placeholder{height:200px;background:linear-gradient(135deg,var(--light),#c6e3f5);display:flex;align-items:center;justify-content:center}
.doctor-img-placeholder i{font-size:4.5rem;color:var(--accent);opacity:.35}
.doc-body{padding:1.4rem}
.doc-spec-badge{display:inline-block;background:var(--light);color:var(--accent);border-radius:6px;padding:.25rem .65rem;font-size:.78rem;font-weight:600;margin-bottom:.6rem}
.doc-name{font-weight:700;font-size:1.05rem;margin-bottom:.3rem}
.doc-info{color:#888;font-size:.84rem;display:flex;align-items:center;gap:.3rem;margin-bottom:.2rem}
.avail-day{display:inline-block;background:#f0f7ff;color:var(--accent);border-radius:5px;padding:.15rem .45rem;font-size:.72rem;font-weight:600;margin:.1rem}
.btn-book{display:block;text-align:center;background:var(--primary);color:#fff;border-radius:10px;padding:.65rem;font-size:.88rem;font-weight:600;text-decoration:none;margin-top:1rem;transition:.2s}
.btn-book:hover{background:var(--accent);color:#fff;transform:translateY(-1px)}
</style>
</head>
<body>
<nav class="nav-main">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="/" class="nav-brand"><i class="fas fa-heartbeat" style="color:var(--accent)"></i>Digi Doctor</a>
    <div class="nav-links d-flex align-items-center gap-2">
      <a href="/">Home</a><a href="/doctors-page" style="color:var(--primary)">Doctors</a><a href="/#book">Book Appointment</a>
      <a href="/login" style="background:var(--primary);color:#fff;border-radius:8px;padding:.45rem 1rem;font-size:.88rem;font-weight:600;text-decoration:none" class="ms-2"><i class="fas fa-user-nurse me-1"></i>Staff</a>
    </div>
  </div>
</nav>

<section class="page-hero">
  <div class="container">
    <h1 class="mb-2">Our Specialist Doctors</h1>
    <p style="opacity:.8;margin-bottom:1.5rem">Experienced, verified medical professionals across all specializations</p>
    <div class="search-bar">
      <i class="fas fa-search" style="color:#aaa"></i>
      <input type="text" id="searchInput" placeholder="Search by name or specialization..." oninput="filterDoctors()">
    </div>
    <div class="filter-chips" id="specChips">
      <span class="chip active" onclick="filterBySpec('',this)">All</span>
    </div>
  </div>
</section>

<section class="doc-grid">
  <div class="container">
    <div id="doctorCount" class="text-muted mb-3 small"></div>
    <div class="row g-4" id="doctorGrid">
      <div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Loading doctors…</p></div>
    </div>
  </div>
</section>

<footer style="background:#0f2d48;color:rgba(255,255,255,.5);text-align:center;padding:1.5rem;font-size:.85rem">
  © 2025 Digi Doctor. All rights reserved.
</footer>

<script>
let allDoctors = [], currentSpec = '';

async function loadDoctors() {
  try {
    allDoctors = await fetch('/api/doctors').then(r=>r.json());
    buildSpecChips();
    renderDoctors(allDoctors);
  } catch(e) {
    document.getElementById('doctorGrid').innerHTML = '<div class="col-12 text-center text-muted py-5">Failed to load doctors</div>';
  }
}

function buildSpecChips() {
  const specs = [...new Set(allDoctors.map(d=>d.specialization))].sort();
  const chips = document.getElementById('specChips');
  chips.innerHTML = '<span class="chip active" onclick="filterBySpec(\'\',this)">All</span>' +
    specs.map(s=>`<span class="chip" onclick="filterBySpec('${s}',this)">${s}</span>`).join('');
}

function filterBySpec(spec, el) {
  currentSpec = spec;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterDoctors();
}

function filterDoctors() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allDoctors.filter(d=>
    (!currentSpec || d.specialization===currentSpec) &&
    (!q || d.name.toLowerCase().includes(q) || d.specialization.toLowerCase().includes(q))
  );
  renderDoctors(filtered);
}

function renderDoctors(docs) {
  document.getElementById('doctorCount').textContent = `Showing ${docs.length} doctor${docs.length!==1?'s':''}`;
  if (!docs.length) {
    document.getElementById('doctorGrid').innerHTML = '<div class="col-12 text-center py-5 text-muted"><i class="fas fa-user-md fa-3x mb-3 d-block" style="opacity:.3"></i>No doctors match your search</div>';
    return;
  }
  document.getElementById('doctorGrid').innerHTML = docs.map(d=>`
    <div class="col-md-6 col-lg-4">
      <div class="doctor-card">
        <div class="doctor-img-placeholder"><i class="fas fa-user-md"></i></div>
        <div class="doc-body">
          <span class="doc-spec-badge">${d.specialization}</span>
          <div class="doc-name">${d.name}</div>
          <div class="doc-info"><i class="fas fa-briefcase-medical"></i> ${d.experience_yrs||0}+ years experience</div>
          ${d.phone?`<div class="doc-info"><i class="fas fa-phone"></i> ${d.phone}</div>`:''}
          ${d.email?`<div class="doc-info"><i class="fas fa-envelope"></i> ${d.email}</div>`:''}
          <a href="/#book" class="btn-book"><i class="fas fa-calendar-plus me-1"></i>Book Appointment</a>
        </div>
      </div>
    </div>`).join('');
}

loadDoctors();
</script>
</body>
</html>
