<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login — Digi Doctor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.login-page { min-height:100vh; background:linear-gradient(135deg,#0f4c75 0%,#1b6ca8 50%,#0a3d62 100%); display:flex; align-items:center; justify-content:center; }
.login-card { background:#fff; border-radius:20px; padding:3rem; width:100%; max-width:420px; box-shadow:0 25px 60px rgba(0,0,0,0.3); }
.login-logo { width:60px; height:60px; background:linear-gradient(135deg,#1b6ca8,#0a3d62); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; }
.login-logo i { color:#fff; font-size:1.6rem; }
.login-title { font-family:'DM Serif Display', serif; font-size:1.8rem; color:#1a1a2e; text-align:center; margin-bottom:.3rem; }
.login-sub { color:#6c757d; text-align:center; font-size:.9rem; margin-bottom:2rem; }
.form-control { border-radius:10px; padding:.75rem 1rem; border:1.5px solid #e0e0e0; font-size:.95rem; }
.form-control:focus { border-color:#1b6ca8; box-shadow:0 0 0 3px rgba(27,108,168,.15); }
.btn-login { background:linear-gradient(135deg,#1b6ca8,#0a3d62); color:#fff; border:none; border-radius:10px; padding:.8rem; font-size:1rem; font-weight:600; width:100%; letter-spacing:.5px; transition:.3s; }
.btn-login:hover { transform:translateY(-1px); box-shadow:0 8px 20px rgba(27,108,168,.4); color:#fff; }
.input-icon { position:relative; }
.input-icon i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#aaa; font-size:.9rem; z-index:5; }
.input-icon .form-control { padding-left:2.6rem; }
.alert-msg { border-radius:10px; font-size:.9rem; }
.badge-staff { display:inline-block; background:#e8f4fd; color:#1b6ca8; border-radius:8px; padding:.3rem .8rem; font-size:.8rem; font-weight:500; margin-bottom:1.5rem; }
.demo-creds { background:#f8f9fa; border-radius:10px; padding:.8rem 1rem; margin-top:1.5rem; font-size:.8rem; color:#555; }
.demo-creds strong { color:#1b6ca8; }
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-heartbeat"></i></div>
    <h1 class="login-title">Digi Doctor</h1>
    <p class="login-sub">Hospital Staff Portal</p>
    <div class="text-center"><span class="badge-staff"><i class="fas fa-shield-alt me-1"></i>Receptionist / Admin Access</span></div>

    <div id="alertBox" class="alert alert-msg d-none"></div>

    <div class="mb-3">
      <label class="form-label fw-500" style="font-weight:500">Username</label>
      <div class="input-icon">
        <i class="fas fa-user"></i>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-500" style="font-weight:500">Password</label>
      <div class="input-icon">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
      </div>
    </div>
    <button class="btn btn-login" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt me-2"></i>Sign In
    </button>

    <div class="demo-creds">
      <div class="mb-1">🔑 <strong>Admin:</strong> admin / Admin@123</div>
      <div>🔑 <strong>Receptionist:</strong> reception1 / Recept@123</div>
    </div>

    <div class="text-center mt-3">
      <a href="/" class="text-muted small"><i class="fas fa-arrow-left me-1"></i>Back to patient portal</a>
    </div>
  </div>
</div>

<script>
function showAlert(msg, type='danger') {
  const box = document.getElementById('alertBox');
  box.className = `alert alert-msg alert-${type}`;
  box.innerHTML = msg;
  box.classList.remove('d-none');
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { showAlert('<i class="fas fa-exclamation-triangle me-2"></i>Please enter username and password.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';
  try {
    const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const data = await res.json();
    if (data.success) {
      showAlert(`<i class="fas fa-check-circle me-2"></i>${data.message}`, 'success');
      setTimeout(() => window.location.href = data.redirect || '/receptionist', 800);
    } else {
      showAlert(`<i class="fas fa-times-circle me-2"></i>${data.error}`);
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
    }
  } catch(e) {
    showAlert('<i class="fas fa-wifi me-2"></i>Connection error. Please try again.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
